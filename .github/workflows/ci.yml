name: Nexus-Core CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  python-tests:
    name: Python Engine Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Python test suite (fail on zero tests)
        run: python run_tests.py

      - name: Run nexus simulation (constraint violations = 0)
        run: python nexus_simulation.py

  node-tests:
    name: Node.js Engine Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run Node fixture tests
        run: node tests/test_fixtures.js

      - name: Run Node 10,000 seeded invariant cases
        run: node tests/test_invariants.js
